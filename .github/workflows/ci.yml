name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck + library build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries (typechecks them implicitly via tsc emit)
        run: pnpm --filter @pipelinekit/core --filter @pipelinekit/recipes --filter @pipelinekit/assets --filter @pipelinekit/sidecar -r build

      - name: Typecheck desktop
        run: pnpm --filter @pipelinekit/desktop run typecheck

      - name: Bundle sidecar (esbuild)
        run: pnpm --filter @pipelinekit/sidecar run bundle

      - name: Build desktop (Vite only)
        run: pnpm --filter @pipelinekit/desktop exec vite build

  cargo-check:
    name: Rust cargo check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries (so esbuild can resolve workspace deps)
        run: pnpm --filter @pipelinekit/core --filter @pipelinekit/recipes --filter @pipelinekit/assets --filter @pipelinekit/sidecar -r build

      - name: Bundle sidecar (Tauri build script validates the resource exists)
        run: pnpm --filter @pipelinekit/sidecar run bundle

      - name: cargo check
        working-directory: ./apps/desktop/src-tauri
        run: cargo check
